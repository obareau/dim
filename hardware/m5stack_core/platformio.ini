[env:m5stack-core-esp32]
platform  = espressif32
board     = m5stack-core-esp32
framework = arduino

; ── Libraries ──────────────────────────────────────────────────────────────
lib_deps =
    m5stack/M5Stack @ ^0.4.6
    bblanchon/ArduinoJson @ ^6.21.5

; ── Build ──────────────────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0

; ── Serial monitor ─────────────────────────────────────────────────────────
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

; ── Upload ─────────────────────────────────────────────────────────────────
; upload_port = /dev/cu.usbserial-XXXX   ; décommenter si auto-détection rate
upload_speed  = 921600
